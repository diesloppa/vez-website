name: Build And Deploy To GitHub Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "*.py"
      - "*.json"
      - ".github/workflows/update-site.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      VK_TOKEN: ${{ secrets.VK_TOKEN }}
      VK_OWNER_ID: ${{ secrets.VK_OWNER_ID }}
      VK_COMMUNITY: ${{ secrets.VK_COMMUNITY }}
      SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip requests cryptography

      - name: Validate secrets
        run: |
          test -n "$VK_TOKEN"
          test -n "$VK_OWNER_ID"
          test -n "$SITE_PASSWORD"

      - name: Fetch discussions
        run: python scrape_vk_discussions.py

      - name: Fetch videos and playlists
        run: python scrape_vk_api.py

      - name: Build playlist metadata
        run: python build_playlist_meta.py

      - name: Build site data
        run: python build_data.py

      - name: Commit updated data back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add playlist_meta.json vk_raw_data.enc.json site/data.enc.json
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "Update archive data"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
